<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Music Hub</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="Heading">
      <div class="Title">
        <img src="Image/sm_5ad31d9b53530.jpg" alt="logo" />
        <h1>Welcome to my Music Hub!</h1>
      </div>
      <div class="desc">
        <h2>The place where i pick out song that i liked.</h2>
      </div>
    </div>
    <div class="TopSelection">
      <h1>Top Selection</h1>
      <div class="card">
        <img
          src="Image/ab67616d00001e02137a20afb01f553b0034f8a3.jfif"
          alt="Do I Clench My Fist?"
        />
      </div>
      <div class="card">
        <img src="Image/MiracleMusical.jpg" alt="Hawaii: Part 2" />
      </div>
    </div>
    <div class="NewlyAdded">
      <h1>Newly Added</h1>
      <div class="NewlyAddedGrid">
        <div class="NewlyAddedCard">
          <img src="Image/IronLotus.jfif" alt="IronLotus" />
          <div class="NewlyAddedCardTxt">
            <h1>Iron Lotus, Mili</h1>
            <h2>Released in January 8, 2021</h2>
          </div>
        </div>
        <div class="NewlyAddedCard">
          <img src="Image/Nouvelle.jfif" alt="Nouvelle" />
          <div class="NewlyAddedCardTxt">
            <h1>Be Yourself Or Die Dreaming, Nouvelle Story</h1>
            <h2>Released in december 24, 2024</h2>
          </div>
        </div>
        <div class="NewlyAddedCard">
          <img src="Image/IronLotus.jfif" alt="IronLotus" />
          <div class="NewlyAddedCardTxt">
            <h1>Iron Lotus, Mili</h1>
            <h2>Released in January 8, 2021</h2>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
